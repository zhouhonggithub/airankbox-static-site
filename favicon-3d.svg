<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="url(#bgGrad)" />
  
  <!-- 3D立体盒子 -->
  <g transform="translate(32, 32)">
    <!-- 立体盒子的各个面 -->
    <!-- 顶面 (等轴投影) -->
    <path d="M -8,-4 L 0,-8 L 8,-4 L 0,0 Z" fill="url(#topGrad)" />
    
    <!-- 正面 -->
    <path d="M -8,-4 L -8,8 L 0,12 L 0,0 Z" fill="url(#frontGrad)" />
    
    <!-- 右侧面 -->
    <path d="M 0,0 L 0,12 L 8,8 L 8,-4 Z" fill="url(#rightGrad)" />
  </g>
</svg> 